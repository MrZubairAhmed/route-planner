<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Planner</title>
  <style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 24px; }
.container { max-width: 720px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { margin: 0 0 6px; }
.subtitle { color: #666; margin-bottom: 20px; line-height: 1.5; }
.dropzone { border: 2px dashed #4285F4; border-radius: 10px; padding: 36px; text-align: center; background: #f8fbff; cursor: pointer; }
.dropzone:hover { background: #e8f0fe; }
.dropzone input { display: none !important; }
.preview { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 14px; margin-top: 16px; display: none; font-size: 0.9rem; }
.preview.visible { display: block; }
.preview.error { background: #fce8e6; border-color: #f5c6cb; color: #c5221f; }
.btn { margin-top: 16px; padding: 14px 24px; background: #4285F4; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
.btn:disabled { background: #aaa; cursor: not-allowed; }
.btn-link { display: inline-block; padding: 8px 16px; background: #fff; color: #4285F4; border: 1px solid #4285F4; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-bottom: 16px; }
.hint { color: #888; font-size: 0.85rem; margin-top: 4px; }
.hint.center { text-align: center; margin-top: 12px; }
.hidden { display: none !important; }
.back { color: #4285F4; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 16px; }
.header { background: #fff; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); max-width: 960px; margin-left: auto; margin-right: auto; }
.header h1 { margin: 0 0 8px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; padding: 0 0 24px; }
.grid .card { margin: 0; }
.grid .card h3 { margin: 0 0 8px; font-size: 1rem; }
.grid .card.error { border-left: 4px solid #ea4335; }
.grid .btn { width: auto; margin: 2px; padding: 8px 14px; font-size: 0.85rem; display: inline-block; text-decoration: none; }
.grid p { margin: 0 0 10px; color: #666; font-size: 0.88rem; }
.status-err { color: #c5221f; }
.header-actions { margin-top: 12px; }
.header-actions .btn { width: auto; margin: 0; }
  </style>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="container">
      <div class="card">
        <h1>Route Planner</h1>
        <p class="subtitle">Upload any Excel file with location coordinates — routes are generated automatically in your browser.</p>
        <button type="button" class="btn-link" id="templateBtn">Download blank template</button>
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept=".xlsx,.xls">
          <p><strong>Drop Excel file here</strong> or click to browse</p>
          <p id="fileName" class="hint">No file selected</p>
        </div>
        <div class="preview" id="preview"></div>
        <button type="button" class="btn" id="submitBtn" disabled>Generate Routes</button>
        <p class="hint center" id="status"></p>
      </div>
    </div>
  </div>
  <div id="results" class="hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
