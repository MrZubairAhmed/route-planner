services:
  - type: web
    name: route-planner
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
